<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Kyne · Film Composer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body, #root { width:100%; height:100%; overflow:hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', 'Inter', sans-serif; }

  @keyframes wave {
    0%   { transform: scaleY(0.3); opacity:0.5; }
    100% { transform: scaleY(1);   opacity:1;   }
  }
  @keyframes fadeIn {
    from { opacity:0; transform:scale(0.96) translateY(6px); }
    to   { opacity:1; transform:scale(1)    translateY(0);   }
  }
  @keyframes iconDrop {
    from { opacity:0; transform:scale(0.5) translateY(-20px); }
    to   { opacity:1; transform:scale(1)   translateY(0);     }
  }

  .window-enter { animation: fadeIn 0.18s ease forwards; }
  .icon-drop    { animation: iconDrop 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.2); border-radius:3px; }

  .dragging * { user-select:none !important; pointer-events:none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════════════════════

const WORKS_CSV_PATH = 'data/works.csv';

// Menu bar label (shown next to Apple logo)
const APP_TITLE_BOLD   = 'Gabriel Kyne';
const APP_TITLE_LIGHT  = 'Film Composer';

// ───────────────────────────────────────────────────────────────────────────
// DOCK CONFIGURATION
//
// To ADD a new dock item, append an entry to DOCK_ITEMS below. Fields:
//   id       — unique string. Also the PNG filename at assets/dock/{id}.png
//              (if no PNG exists, the built-in SVG fallback is used)
//   label    — tooltip text shown on hover
//   action   — what happens when the icon is clicked. One of:
//
//     { type:'section', section:'works' }
//         → opens one of the built-in sections
//         → valid sections: 'works' | 'about' | 'contact' | 'teaching'
//
//     { type:'url', url:'https://...' }
//         → opens that URL in a new tab
//
//     { type:'file', path:'documents/cv.pdf', name:'CV' }
//         → opens the file in the media viewer
//         → `path` is resolved relative to assets/  (so 'cv.pdf' → assets/cv.pdf)
//         → `name` is the window title
//         → media-type inferred from file extension
//
// To CHANGE the icon for an item, drop a PNG at assets/dock/{id}.png
//   (recommended: 128×128 or larger, square, any colors you like)
//
// To REMOVE an item, delete its entry from DOCK_ITEMS.
//
// To REORDER items, just move them in the array.
// ───────────────────────────────────────────────────────────────────────────
const DOCK_ITEMS = [
  { id:'finder',   label:'Finder',   action:{ type:'section', section:'works' } },
  { id:'works',    label:'Works',    action:{ type:'section', section:'works' } },
  { id:'about',    label:'About Me', action:{ type:'section', section:'about' } },
  { id:'contact',  label:'Contact',  action:{ type:'section', section:'contact' } },
  { id:'teaching', label:'Teaching', action:{ type:'section', section:'teaching' } },
  // Example — uncomment to add a CV link:
  // { id:'cv', label:'CV', action:{ type:'file', path:'documents/cv.pdf', name:'CV' } },
  // Example — uncomment to add an external link:
  // { id:'instagram', label:'Instagram', action:{ type:'url', url:'https://instagram.com/imsoproud.ofu' } },
];

// Media-type inferred from file extension (used for dock file-actions)
const EXT_TO_MEDIA_TYPE = {
  mp3:'audio', wav:'audio', ogg:'audio', m4a:'audio', flac:'audio', aac:'audio',
  mp4:'video', webm:'video', mov:'video', m4v:'video',
  jpg:'image', jpeg:'image', png:'image', gif:'image', webp:'image', svg:'image', heic:'image',
  txt:'text', md:'text', html:'text',
  pdf:'pdf',
};

// ═══════════════════════════════════════════════════════════════════════════
// PATH RESOLUTION — so you don't have to type "/assets/" every time
// ═══════════════════════════════════════════════════════════════════════════
//   'winterreise.mp3'              → 'assets/winterreise.mp3'
//   'audio/winterreise.mp3'        → 'assets/audio/winterreise.mp3'
//   '/assets/audio/winterreise.mp3'→ 'assets/audio/winterreise.mp3'
//   'assets/audio/winterreise.mp3' → 'assets/audio/winterreise.mp3'
//   'https://example.com/a.mp3'    → 'https://example.com/a.mp3'  (untouched)
//   'uploads/wallpaper.jpg'        → 'uploads/wallpaper.jpg'       (untouched)
// ───────────────────────────────────────────────────────────────────────────
function resolvePath(p) {
  if (!p) return '';
  p = p.trim();
  if (!p) return '';
  if (/^(https?:|data:|blob:)/i.test(p)) return p;
  let cleaned = p.replace(/^\/+/, '');                   // strip leading /
  if (/^(assets|uploads|data)\//i.test(cleaned)) return cleaned;
  return 'assets/' + cleaned;
}

function extOf(path) {
  const m = /\.([a-z0-9]+)(?:\?.*)?$/i.exec(path || '');
  return m ? m[1].toLowerCase() : '';
}

function guessMediaType(path) {
  return EXT_TO_MEDIA_TYPE[extOf(path)] || 'unknown';
}

// ═══════════════════════════════════════════════════════════════════════════
// CSV PARSER
// ═══════════════════════════════════════════════════════════════════════════

function parseCSVRow(line) {
  const out = [];
  let cur = '';
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"' && inQ && line[i+1] === '"') { cur += '"'; i++; continue; }
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { out.push(cur); cur = ''; continue; }
    cur += c;
  }
  out.push(cur);
  return out.map(s => s.trim());
}

function parseCSV(csvText) {
  const lines = csvText.replace(/\r\n/g, '\n').split('\n').filter(l => l.trim().length);
  if (lines.length < 2) return [];

  const headers = parseCSVRow(lines[0]).map(h => h.trim().toLowerCase());
  const rows = [];

  for (let i = 1; i < lines.length; i++) {
    const values = parseCSVRow(lines[i]);
    const row = {};
    headers.forEach((h, idx) => { row[h] = (values[idx] || '').trim(); });
    if (!row.number || !row.name) continue;

    // Accept either 'description' (new) or 'instrumentation' (legacy)
    const description = row.description || row.instrumentation || '';

    rows.push({
      id:            parseInt(row.number),
      name:          row.name,
      year:          row.year,
      description,
      credits:       row.credits || '',
      notes:         row.notes || '',
      mediaType:     (row['media-type'] || '').toLowerCase(),
      mediaLocation: resolvePath(row['media-location']),
      thumbnail:     resolvePath(row['thumbnail-location']),
      sub:           [row.year, description].filter(Boolean).join(' · '),
    });
  }

  return rows;
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════

function seededRand(seed) {
  let s = seed || 1;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}

// Natural scatter — mostly near center, a few toward the edges, all visible.
function generateInitialPositions(works) {
  const W = window.innerWidth, H = window.innerHeight;
  const TOP = 40, BOT = 120, SIDE = 60;
  const iconSize = 100;

  // New random seed every first-load
  const rand = seededRand(Date.now() & 0x7fffffff);
  const positions = {};
  const placed = [];

  const cx = W / 2;
  const cy = (H - TOP - BOT) / 2 + TOP;

  works.forEach((w) => {
    let x, y, tries = 0;
    // ~20% of icons go toward the edges; rest clustered near center
    const edgeMode = rand() < 0.2;

    while (true) {
      if (edgeMode && tries < 8) {
        const side = Math.floor(rand() * 4);
        if (side === 0)      { x = SIDE + rand() * (W - 2*SIDE); y = TOP + rand() * 90; }
        else if (side === 1) { x = W - SIDE - rand() * 140;       y = TOP + rand() * (H - TOP - BOT); }
        else if (side === 2) { x = SIDE + rand() * (W - 2*SIDE); y = H - BOT - 90 + rand() * 70; }
        else                 { x = SIDE + rand() * 140;           y = TOP + rand() * (H - TOP - BOT); }
      } else {
        // Gaussian-ish scatter around the center
        const r1 = rand(), r2 = rand();
        const g1 = Math.sqrt(-2 * Math.log(r1 || 0.0001)) * Math.cos(2 * Math.PI * r2);
        const g2 = Math.sqrt(-2 * Math.log(r1 || 0.0001)) * Math.sin(2 * Math.PI * r2);
        x = cx + g1 * (W * 0.18);
        y = cy + g2 * ((H - TOP - BOT) * 0.22);
      }

      // Clamp to visible area
      x = Math.max(SIDE, Math.min(W - SIDE - iconSize, x));
      y = Math.max(TOP,  Math.min(H - BOT  - iconSize, y));

      // Check overlap
      const tooClose = placed.some(p => Math.hypot(p.x-x, p.y-y) < iconSize * 0.85);
      if (!tooClose || tries > 25) break;
      tries++;
    }

    positions[w.id] = { x, y };
    placed.push({ x, y });
  });

  return positions;
}

const fmtTime = (s) => {
  if (!isFinite(s) || s < 0) return '0:00';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
};

// ═══════════════════════════════════════════════════════════════════════════
// THUMBNAIL — image from filepath, letter fallback. No corner badge.
// ═══════════════════════════════════════════════════════════════════════════

function Thumbnail({ work, size = 80 }) {
  const [imgError, setImgError] = useState(false);
  const hasImage = work.thumbnail && !imgError;

  return (
    <div style={{
      width:size, height:size, borderRadius: size * 0.175,
      position:'relative', overflow:'hidden', flexShrink:0,
      boxShadow:'0 4px 20px rgba(0,0,0,0.55)',
      background:'linear-gradient(145deg, #2a2a2a, #111)',
    }}>
      {hasImage ? (
        <img
          src={work.thumbnail}
          alt={work.name}
          onError={() => setImgError(true)}
          style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}
          draggable={false}
        />
      ) : (
        <div style={{
          width:'100%', height:'100%',
          display:'flex', alignItems:'center', justifyContent:'center',
          color:'rgba(255,255,255,0.85)',
          fontSize: size * 0.42, fontWeight: 300,
        }}>
          {(work.name || '?').charAt(0).toUpperCase()}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// DESKTOP ICON
// ═══════════════════════════════════════════════════════════════════════════

function DesktopIcon({ work, pos, onPosChange, onOpen, isSelected, onSelect, dropDelay }) {
  const drag = useRef(null);

  const onMouseDown = useCallback((e) => {
    e.stopPropagation();
    onSelect(work.id);
    drag.current = { mx0:e.clientX, my0:e.clientY, x0:pos.x, y0:pos.y, moved:false };

    const onMove = (ev) => {
      if (!drag.current) return;
      const dx = ev.clientX - drag.current.mx0, dy = ev.clientY - drag.current.my0;
      if (!drag.current.moved && Math.hypot(dx,dy) > 4) {
        drag.current.moved = true;
        document.body.classList.add('dragging');
      }
      if (drag.current.moved) onPosChange(work.id, { x: drag.current.x0+dx, y: drag.current.y0+dy });
    };
    const onUp = () => {
      drag.current = null;
      document.body.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  }, [pos, work.id, onPosChange, onSelect]);

  const onDoubleClick = useCallback((e) => {
    e.stopPropagation();
    onOpen(work);
  }, [work, onOpen]);

  return (
    <div
      className="icon-drop"
      style={{
        position:'absolute', left:pos.x, top:pos.y,
        width:90, display:'flex', flexDirection:'column', alignItems:'center',
        cursor:'default', zIndex: isSelected ? 10 : 2,
        animationDelay: `${dropDelay}ms`,
        userSelect:'none',
      }}
      onMouseDown={onMouseDown}
      onDoubleClick={onDoubleClick}
    >
      <div style={{
        padding:4, borderRadius:16,
        background: isSelected ? 'rgba(10,132,255,0.25)' : 'transparent',
        outline: isSelected ? '1.5px solid rgba(10,132,255,0.6)' : '1.5px solid transparent',
        outlineOffset:1, transition:'background 0.1s',
      }}>
        <Thumbnail work={work} size={72} />
      </div>
      <div style={{
        marginTop:3, fontSize:11, lineHeight:1.35, textAlign:'center',
        maxWidth:88, wordBreak:'break-word',
        color:'#fff',
        textShadow:'0 1px 3px rgba(0,0,0,0.95), 0 0 14px rgba(0,0,0,0.7)',
        padding:'1px 5px', borderRadius:3,
        background: isSelected ? 'rgba(10,132,255,0.8)' : 'transparent',
        transition:'background 0.1s',
      }}>
        {work.name}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// METADATA BLOCK — shared by all players
// ═══════════════════════════════════════════════════════════════════════════

function MetadataBlock({ work, compact = false }) {
  return (
    <div style={{ minWidth:0 }}>
      <div style={{
        fontSize: compact ? 15 : 17, fontWeight:700, color:'#1d1d1f',
        marginBottom:3, lineHeight:1.2,
      }}>{work.name}</div>
      {work.sub && (
        <div style={{ fontSize:12, color:'#888', marginBottom: work.credits || work.notes ? 4 : 8 }}>
          {work.sub}
        </div>
      )}
      {work.credits && (
        <div style={{ fontSize:11.5, color:'#555', marginBottom: work.notes ? 4 : 8, lineHeight:1.5 }}>
          {work.credits}
        </div>
      )}
      {work.notes && (
        <div style={{ fontSize:11, color:'#777', fontStyle:'italic', marginBottom:8, lineHeight:1.5 }}>
          {work.notes}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// WAVEFORM (decorative, animated during audio playback)
// ═══════════════════════════════════════════════════════════════════════════

function Waveform({ work, playing }) {
  const bars = useMemo(() => {
    const r = seededRand(work.id * 7);
    return Array.from({length:36}, () => 8 + r() * 38);
  }, [work.id]);

  return (
    <div style={{
      display:'flex', alignItems:'center', gap:2.5,
      height:52, padding:'0 4px', width:'100%',
    }}>
      {bars.map((h,i) => (
        <div key={i} style={{
          flex:1, height:h, borderRadius:3,
          background: playing
            ? `linear-gradient(to top, #0a84ff, #5ac8fa)`
            : 'rgba(0,0,0,0.15)',
          transformOrigin:'center',
          animation: playing
            ? `wave ${0.4 + (i % 7) * 0.12}s ease-in-out infinite alternate`
            : 'none',
          animationDelay:`${i*0.04}s`,
          transition:'background 0.3s',
        }}/>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// AUDIO PLAYER
// ═══════════════════════════════════════════════════════════════════════════

const btnIconStyle = {
  background:'none', border:'none', cursor:'pointer', padding:6,
  color:'#aaa', fontSize:18, lineHeight:1,
  transition:'color 0.15s',
};

function AudioPlayer({ work }) {
  const audioRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [duration, setDuration] = useState(0);
  const [currentTime, setCurrentTime] = useState(0);
  const [err, setErr] = useState(null);

  const toggle = () => {
    const a = audioRef.current;
    if (!a) return;
    if (playing) a.pause();
    else a.play().catch(e => setErr(e.message));
  };
  const seekTo = (pct) => {
    const a = audioRef.current;
    if (!a || !isFinite(a.duration)) return;
    a.currentTime = (pct / 100) * a.duration;
  };

  return (
    <div style={{ padding:'20px 22px 22px', width:380, background:'#fafafa' }}>
      <audio
        ref={audioRef}
        src={work.mediaLocation}
        preload="metadata"
        onPlay={() => setPlaying(true)}
        onPause={() => setPlaying(false)}
        onEnded={() => { setPlaying(false); setProgress(0); setCurrentTime(0); }}
        onTimeUpdate={e => {
          const t = e.target.currentTime, d = e.target.duration;
          setCurrentTime(t);
          if (isFinite(d) && d > 0) setProgress((t / d) * 100);
        }}
        onLoadedMetadata={e => setDuration(e.target.duration)}
        onError={() => setErr('Unable to load audio file')}
      />

      <div style={{ display:'flex', gap:16, alignItems:'flex-start', marginBottom:18 }}>
        <Thumbnail work={work} size={96} />
        <div style={{ flex:1, minWidth:0 }}>
          <MetadataBlock work={work} />
          <span style={{
            display:'inline-block', background:'#0a84ff', color:'#fff',
            fontSize:10, padding:'2px 8px', borderRadius:20,
            fontWeight:600, letterSpacing:'0.06em',
          }}>AUDIO</span>
        </div>
      </div>

      <Waveform work={work} playing={playing} />

      <div style={{ marginTop:10, padding:'0 4px' }}>
        <div
          style={{ height:4, background:'#e0e0e0', borderRadius:2, cursor:'pointer', position:'relative', marginBottom:5 }}
          onClick={e => {
            const r = e.currentTarget.getBoundingClientRect();
            seekTo(Math.max(0, Math.min(100, (e.clientX-r.left)/r.width*100)));
          }}
        >
          <div style={{
            position:'absolute', left:0, top:0, height:'100%',
            width:`${progress}%`, borderRadius:2,
            background:'linear-gradient(to right, #0a84ff, #5ac8fa)',
          }}/>
          <div style={{
            position:'absolute', top:'50%', left:`${progress}%`,
            transform:'translate(-50%,-50%)',
            width:12, height:12, borderRadius:'50%',
            background:'#0a84ff', boxShadow:'0 1px 4px rgba(10,132,255,0.5)',
          }}/>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', fontSize:10.5, color:'#aaa' }}>
          <span>{fmtTime(currentTime)}</span><span>{fmtTime(duration)}</span>
        </div>
      </div>

      <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:22, marginTop:14 }}>
        <button onClick={() => seekTo(0)} style={btnIconStyle}>⏮</button>
        <button onClick={toggle} style={{
          width:48, height:48, borderRadius:'50%',
          background: playing ? '#555' : '#0a84ff',
          border:'none', cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:20, color:'#fff',
          boxShadow: playing ? '0 2px 8px rgba(0,0,0,0.2)' : '0 4px 16px rgba(10,132,255,0.45)',
          transition:'background 0.2s, box-shadow 0.2s',
        }}>{playing ? '⏸' : '▶'}</button>
        <button onClick={() => seekTo(100)} style={btnIconStyle}>⏭</button>
      </div>

      {err && (
        <div style={{ marginTop:12, fontSize:11, color:'#ff3b30', textAlign:'center' }}>
          {err} — check <code>{work.mediaLocation}</code>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// VIDEO PLAYER — no autoplay, user clicks play
// ═══════════════════════════════════════════════════════════════════════════

function VideoPlayer({ work }) {
  const [err, setErr] = useState(null);
  return (
    <div style={{ background:'#000', width:620, maxWidth:'90vw' }}>
      <video
        src={work.mediaLocation}
        controls
        preload="metadata"
        style={{ display:'block', width:'100%', maxHeight:'70vh', background:'#000' }}
        onError={() => setErr('Unable to load video file')}
      />
      <div style={{ padding:'14px 18px', background:'#111', color:'#fff' }}>
        <div style={{ fontSize:15, fontWeight:600 }}>{work.name}</div>
        {work.sub && <div style={{ fontSize:12, color:'#aaa', marginTop:2 }}>{work.sub}</div>}
        {work.credits && <div style={{ fontSize:11.5, color:'#888', marginTop:5, lineHeight:1.5 }}>{work.credits}</div>}
        {work.notes && <div style={{ fontSize:11, color:'#777', fontStyle:'italic', marginTop:5, lineHeight:1.5 }}>{work.notes}</div>}
        {err && <div style={{ fontSize:11, color:'#ff6b5e', marginTop:8 }}>{err} — check <code>{work.mediaLocation}</code></div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// IMAGE VIEWER
// ═══════════════════════════════════════════════════════════════════════════

function ImageViewer({ work }) {
  const [err, setErr] = useState(false);
  return (
    <div style={{ background:'#1a1a1a', maxWidth:'90vw', maxHeight:'85vh', display:'flex', flexDirection:'column' }}>
      <div style={{ padding:18, display:'flex', alignItems:'center', justifyContent:'center',
        minWidth:400, minHeight:260, maxHeight:'70vh', overflow:'hidden' }}>
        {err ? (
          <div style={{ color:'#888', fontSize:13, textAlign:'center', padding:20 }}>
            Unable to load image.<br/><code style={{fontSize:11}}>{work.mediaLocation}</code>
          </div>
        ) : (
          <img
            src={work.mediaLocation}
            alt={work.name}
            onError={() => setErr(true)}
            style={{ maxWidth:'100%', maxHeight:'70vh', objectFit:'contain', display:'block' }}
          />
        )}
      </div>
      <div style={{ padding:'12px 18px', background:'#0d0d0d', color:'#fff', borderTop:'1px solid #222' }}>
        <div style={{ fontSize:15, fontWeight:600 }}>{work.name}</div>
        {work.sub && <div style={{ fontSize:12, color:'#aaa', marginTop:2 }}>{work.sub}</div>}
        {work.credits && <div style={{ fontSize:11.5, color:'#888', marginTop:5, lineHeight:1.5 }}>{work.credits}</div>}
        {work.notes && <div style={{ fontSize:11, color:'#777', fontStyle:'italic', marginTop:5, lineHeight:1.5 }}>{work.notes}</div>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// TEXT VIEWER (also auto-routes to PDF viewer for .pdf files)
// ═══════════════════════════════════════════════════════════════════════════

function TextViewer({ work }) {
  const [text, setText] = useState('');
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);

  useEffect(() => {
    let cancelled = false;
    setLoading(true); setErr(null);
    fetch(work.mediaLocation)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
      .then(t => { if (!cancelled) { setText(t); setLoading(false); } })
      .catch(e => { if (!cancelled) { setErr(e.message); setLoading(false); } });
    return () => { cancelled = true; };
  }, [work.mediaLocation]);

  return (
    <div style={{ width:580, maxWidth:'90vw', background:'#fafafa' }}>
      <div style={{ padding:'14px 20px', borderBottom:'1px solid #ececec', display:'flex', alignItems:'flex-start', gap:14 }}>
        <Thumbnail work={work} size={44} />
        <MetadataBlock work={work} compact />
      </div>
      <pre style={{
        padding:'18px 22px', fontSize:13, lineHeight:1.65,
        fontFamily:'ui-monospace, SFMono-Regular, Menlo, monospace',
        color:'#2a2a2c',
        maxHeight:'60vh', overflow:'auto',
        whiteSpace:'pre-wrap', wordBreak:'break-word',
        background:'#fafafa',
      }}>
        {loading ? 'Loading…' : err ? `Could not load file: ${err}\nPath: ${work.mediaLocation}` : text}
      </pre>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MEDIA VIEWER — routes to the right player based on media-type
// ═══════════════════════════════════════════════════════════════════════════

function MediaViewer({ work }) {
  if (!work.mediaLocation) {
    return (
      <div style={{ padding:30, width:360, background:'#fafafa' }}>
        <div style={{ fontSize:14, fontWeight:600, marginBottom:6 }}>{work.name}</div>
        {work.sub && <div style={{ fontSize:12, color:'#888', marginBottom:14 }}>{work.sub}</div>}
        <div style={{ fontSize:12, color:'#ff9500', padding:12, background:'#fff8ed', borderRadius:8 }}>
          No <code>media-location</code> set in CSV for this work.
        </div>
      </div>
    );
  }

  // If a 'text' media-type actually points to a PDF, route to the PDF viewer.
  const ext = extOf(work.mediaLocation);

  switch (work.mediaType) {
    case 'audio': return <AudioPlayer work={work} />;
    case 'video': return <VideoPlayer work={work} />;
    case 'image': return <ImageViewer work={work} />;
    case 'pdf':
    case 'score': return <PdfViewer work={work} />;
    case 'text':
      return ext === 'pdf' ? <PdfViewer work={work} /> : <TextViewer work={work} />;
    default:
      // Fallback: guess from file extension
      const guessed = guessMediaType(work.mediaLocation);
      if (guessed !== 'unknown' && guessed !== work.mediaType) {
        return <MediaViewer work={{ ...work, mediaType: guessed }} />;
      }
      return (
        <div style={{ padding:30, width:360, background:'#fafafa' }}>
          <div style={{ fontSize:14, fontWeight:600 }}>{work.name}</div>
          <div style={{ fontSize:12, color:'#ff3b30', marginTop:12 }}>
            Unknown media-type: "{work.mediaType || '(empty)'}". Use one of: audio, video, image, text, pdf, score.
          </div>
        </div>
      );
  }
}

// ═══════════════════════════════════════════════════════════════════════════

function AppWindow({ win, onClose, onFocus, zIndex, works, onOpenWork }) {
  const drag = useRef(null);
  const [pos, setPos] = useState(win.pos);

  const onTitleDown = (e) => {
    if (e.target.closest('[data-traffic]')) return;
    e.preventDefault(); onFocus(win.id);
    drag.current = { mx0:e.clientX, my0:e.clientY, x0:pos.x, y0:pos.y };
    document.body.classList.add('dragging');
    const onMove = ev => {
      if (!drag.current) return;
      setPos({ x:drag.current.x0+ev.clientX-drag.current.mx0, y:drag.current.y0+ev.clientY-drag.current.my0 });
    };
    const onUp = () => {
      drag.current=null; document.body.classList.remove('dragging');
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  };

  const title = (
    win.type === 'player'   ? (win.work?.name || '') :
    win.type === 'about'    ? 'About Gabriel Kyne'   :
    win.type === 'contact'  ? 'Contact'              :
    win.type === 'teaching' ? 'Teaching'             :
    win.type === 'works'    ? 'All Works'            : ''
  );

  return (
    <div
      className="window-enter"
      style={{
        position:'fixed', left:pos.x, top:pos.y, zIndex,
        borderRadius:13, overflow:'hidden',
        boxShadow:'0 22px 70px rgba(0,0,0,0.45), 0 0 0 0.5px rgba(0,0,0,0.12)',
        minWidth:280,
      }}
      onMouseDown={() => onFocus(win.id)}
    >
      <div onMouseDown={onTitleDown} style={{
        height:38, background:'linear-gradient(to bottom, #f0f0f0, #e8e8e8)',
        borderBottom:'1px solid #d8d8d8',
        display:'flex', alignItems:'center', padding:'0 14px',
        cursor:'default', userSelect:'none', position:'relative',
      }}>
        <div data-traffic style={{ display:'flex', gap:7, alignItems:'center' }}>
          {['#ff5f57','#febc2e','#28c840'].map((bg,i) => (
            <div key={i}
              onClick={i===0 ? () => onClose(win.id) : undefined}
              style={{
                width:13, height:13, borderRadius:'50%', background:bg,
                cursor: i===0 ? 'pointer' : 'default', flexShrink:0,
              }}
              onMouseEnter={e => e.currentTarget.style.filter='brightness(0.82)'}
              onMouseLeave={e => e.currentTarget.style.filter=''}
            />
          ))}
        </div>
        <span style={{
          position:'absolute', left:'50%', transform:'translateX(-50%)',
          fontSize:13, fontWeight:500, color:'#3a3a3c',
          maxWidth:380, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
        }}>{title}</span>
      </div>
      {win.type==='player'   && <MediaViewer      work={win.work} />}
      {win.type==='about'    && <AboutContent     />}
      {win.type==='contact'  && <ContactContent   />}
      {win.type==='teaching' && <TeachingContent  />}
      {win.type==='works'    && <WorksContent works={works} onOpenWork={onOpenWork} />}
    </div>
  );
}

  const menuItem = (label, bold) => (
    <span style={{
      fontSize:13, color:'#1d1d1f', padding:'3px 10px', borderRadius:5,
      fontWeight: bold ? 700 : 400, cursor:'default', letterSpacing:'-0.01em',
    }}>{label}</span>
  );

  const trayItem = (content) => (
    <div style={{
      display:'flex', alignItems:'center', padding:'0 6px', height:'100%',
      color:'#1d1d1f', cursor:'default',
    }}>{content}</div>
  );

  return (
    <div style={{
      position:'fixed', top:0, left:0, right:0, height:24,
      // Neutral, slightly cool translucent tint — no saturation boost (avoids the tan over warm wallpapers).
      background:'rgba(246,246,248,0.32)',
      backdropFilter:'blur(22px)',
      WebkitBackdropFilter:'blur(22px)',
      boxShadow:'inset 0 -0.5px 0 rgba(0,0,0,0.10)',
      display:'flex', alignItems:'center', justifyContent:'space-between',
      padding:'0 10px', zIndex:9998,
      color:'#1d1d1f',
      fontFamily:'-apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:0 }}>
        {/* Apple logo */}
        <span style={{ padding:'2px 10px', cursor:'default', display:'flex', alignItems:'center' }}>
          <svg width="13" height="15" viewBox="0 0 13 15" style={{display:'block'}}>
            <path d="M10.08 7.88c-.02-2.08 1.7-3.08 1.78-3.13-.97-1.42-2.48-1.62-3.02-1.64-1.29-.13-2.52.76-3.18.76-.67 0-1.67-.74-2.75-.72-1.41.02-2.72.82-3.44 2.08-1.48 2.57-.38 6.37 1.06 8.46.71 1.02 1.55 2.17 2.65 2.13 1.07-.04 1.47-.69 2.76-.69 1.29 0 1.65.69 2.77.67 1.15-.02 1.87-1.04 2.57-2.07.82-1.18 1.15-2.33 1.17-2.39-.03-.01-2.24-.86-2.27-3.42zM8.08 2.16c.58-.72.98-1.71.87-2.7-.84.04-1.87.57-2.48 1.28-.54.62-1.03 1.64-.9 2.6.94.07 1.91-.48 2.51-1.18z" fill="#000"/>
          </svg>
        </span>
        {menuItem(APP_TITLE_BOLD, true)}
        {menuItem(APP_TITLE_LIGHT, false)}
        {menuItem('File')}
        {menuItem('Edit')}
        {menuItem('View')}
        {menuItem('Window')}
        {menuItem('Help')}
      </div>

      <div style={{ display:'flex', alignItems:'center', gap:2, height:'100%' }}>
        {trayItem(TrayIcons.volume)}
        {trayItem(TrayIcons.battery({ level: 0.85, charging: true }))}
        <span style={{
          fontSize:13, color:'#1d1d1f', padding:'0 8px 0 6px',
          fontVariantNumeric:'tabular-nums', letterSpacing:'-0.01em',
          cursor:'default',
        }}>
          {dateStr}&nbsp;&nbsp;{timeStr}
        </span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════════════════════════════════

function App() {
  const [works, setWorks] = useState([]);
  const [positions, setPositions] = useState({});
  const [windows, setWindows] = useState([]);
  const [selected, setSelected] = useState(null);
  const [loadError, setLoadError] = useState(null);
  const zRef = useRef(200);
  const nextZ = () => ++zRef.current;

  useEffect(() => {
    const loadWorks = async () => {
      try {
        const response = await fetch(WORKS_CSV_PATH);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const csvText = await response.text();
        const parsed = parseCSV(csvText);
        setWorks(parsed);

        const saved = localStorage.getItem('gk-icon-positions');
        if (saved) {
          const pos = JSON.parse(saved);
          const allPresent = parsed.every(w => pos[w.id]);
          if (allPresent) { setPositions(pos); return; }
        }
        setPositions(generateInitialPositions(parsed));
      } catch (err) {
        console.error('Failed to load works:', err);
        setLoadError(err.message);
      }
    };
    loadWorks();
  }, []);

  const openWindow = useCallback((type, work = null) => {
    const id = type === 'player' ? `player-${work.id || work.name}` : type;
    setWindows(prev => {
      const exists = prev.find(w => w.id === id);
      if (exists) return prev.map(w => w.id===id ? {...w, zIndex:nextZ()} : w);
      return [...prev, {
        id, type, work, zIndex: nextZ(),
        pos: {
          x: window.innerWidth  * 0.22 + Math.random() * window.innerWidth  * 0.3,
          y: window.innerHeight * 0.08 + Math.random() * window.innerHeight * 0.18,
        },
      }];
    });
  }, []);

  const closeWindow = useCallback(id => setWindows(p => p.filter(w => w.id!==id)), []);
  const focusWindow = useCallback(id => setWindows(p => p.map(w => w.id===id ? {...w, zIndex:nextZ()} : w)), []);
  const updatePos = useCallback((id, pos) => {
    setPositions(p => {
      const next = {...p, [id]:pos};
      localStorage.setItem('gk-icon-positions', JSON.stringify(next));
      return next;
    });
  }, []);

  const handleDockItem = useCallback((item) => {
    const a = item.action || {};
    if (a.type === 'section') {
      openWindow(a.section || 'works');
    } else if (a.type === 'url') {
      window.open(a.url, '_blank', 'noopener');
    } else if (a.type === 'file') {
      const path = resolvePath(a.path);
      const fakeWork = {
        id: `dock-${item.id}`,
        name: a.name || item.label,
        sub: '',
        mediaType: guessMediaType(path),
        mediaLocation: path,
        thumbnail: '',
      };
      openWindow('player', fakeWork);
    }
  }, [openWindow]);

  const openSections = useMemo(
    () => new Set(windows.map(w => w.type==='player' ? null : w.type).filter(Boolean)),
    [windows]
  );

  return (
    <div
      style={{
        width:'100vw', height:'100vh', overflow:'hidden', position:'relative',
        backgroundImage:`url(https://pub-715e1f7bc3864cb8b05d16f94698b504.r2.dev/assets/images/wallpaper.jpg)`,
        backgroundSize:'cover', backgroundPosition:'center',
      }}
      onClick={() => setSelected(null)}
    >
      <div style={{ position:'absolute', inset:0, pointerEvents:'none', background:'rgba(0,0,0,0.08)' }}/>

      <MenuBar />

      <div style={{ position:'absolute', inset:0, top:24, bottom:100 }}>
        {works.map((work, i) => (
          <DesktopIcon
            key={work.id}
            work={work}
            pos={positions[work.id] || {x:80+i*10, y:80}}
            onPosChange={updatePos}
            onOpen={w => openWindow('player', w)}
            isSelected={selected === work.id}
            onSelect={setSelected}
            dropDelay={i * 40}
          />
        ))}
      </div>

      {loadError && (
        <div style={{
          position:'fixed', top:42, left:'50%', transform:'translateX(-50%)',
          background:'rgba(255,59,48,0.95)', color:'#fff',
          padding:'10px 18px', borderRadius:10, fontSize:13, zIndex:10000,
          boxShadow:'0 4px 20px rgba(0,0,0,0.3)',
        }}>
          Could not load <code>{WORKS_CSV_PATH}</code>: {loadError}
        </div>
      )}

      {windows.map(win => (
        <AppWindow
          key={win.id}
          win={win}
          onClose={closeWindow}
          onFocus={focusWindow}
          zIndex={win.zIndex}
          works={works}
          onOpenWork={w => openWindow('player', w)}
        />
      ))}

      <Dock items={DOCK_ITEMS} onItemClick={handleDockItem} openSections={openSections} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
